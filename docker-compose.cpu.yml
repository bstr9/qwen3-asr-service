services:
  asr:
    image: lancelrq/qwen3-asr-service:latest-cpu
    # build:
    #   context: .
    #   dockerfile: Dockerfile.cpu
    #   tags:
    #     - lancelrq/qwen3-asr-service:latest-cpu
    ports:
      - "8765:8765"
    # environment:
    #   ASR_API_KEY: sk-your-key-here   # 设置后启用 Bearer token 认证
    volumes:
      - ./asr-service/models:/app/models
      - ./asr-service/logs:/app/logs
    command:
      - --model-size=0.6b        # 模型大小：0.6b / 1.7b
      - --model-source=modelscope # 下载源：modelscope / huggingface
      # - --use-punc              # 启用标点恢复（按需开启）
      # - --api-key=sk-xxx        # API 密钥（覆盖 ASR_API_KEY 环境变量）
      - --web                     # 启用 Web UI（访问 /web-ui）
      - --max-segment=5           # VAD 切片合并最大时长（秒）
    restart: unless-stopped
